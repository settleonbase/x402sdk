server {
    server_name beamio.app;

    root /var/www/beamio.app;
    index index.html;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ================================
    #  /.well-known/
    # ================================
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # ================================
    #  API Proxy -> localhost:2222
    # ================================
    location /api/ {
        proxy_pass http://127.0.0.1:2222;

        # 保留真实 Host
        proxy_set_header Host $host;
        # 传递真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 让后端拿到 HTTPS 信息
        proxy_set_header X-Forwarded-Proto $scheme;

        # 避免 502 缓存
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # NOTE: 不要在这里硬覆盖 Content-Type / Accept，
        # 否则 x402-fetch 第二跳的 application/json POST 会被改写、且也阻断未来其他 mime。
        # 后端自己会按 Express 解析 body。

        # ===== CORS：必须放行 X-PAYMENT 才能让 x402-fetch 的"两跳"完成 =====
        #   第一跳 POST                → 返回 402 + accepts(paymentRequirements)
        #   第二跳 OPTIONS preflight   → ACR-Headers: access-control-expose-headers, content-type, x-payment
        #     ⚠️ x402-fetch lib 在 request 里非常诡异地塞了 `Access-Control-Expose-Headers: X-PAYMENT-RESPONSE`
        #        作为 REQUEST header（本应是 response header），浏览器不管语义、按字符串放进 ACR-Headers，
        #        服务器若不放行 ⇒ preflight fail ⇒ 前端 "Failed to fetch / blocked by CORS"。
        #   第二跳 POST + X-PAYMENT    → 服务端 verify + settle USDC
        #
        # 这里用 $http_access_control_request_headers 回显，覆盖未来 x402 库再加任何自定义头。
        # 因为 Allow-Origin = `*` 且无 credentials，回显 ACR-Headers 安全（CORS 规范允许）。
        # 兜底：preflight 没带 ACR-Headers 时回退到显式白名单。
        set $cors_allow_headers $http_access_control_request_headers;
        if ($cors_allow_headers = "") {
            set $cors_allow_headers "Content-Type, Authorization, X-Requested-With, X-PAYMENT, Access-Control-Expose-Headers";
        }

        add_header Access-Control-Allow-Origin   "*" always;
        add_header Access-Control-Allow-Methods  "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers  $cors_allow_headers always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-PAYMENT-RESPONSE" always;
        add_header Access-Control-Max-Age 600 always;

        # 处理预检请求
        # ⚠ nginx 在 `if {}` 里 `return` 时，外层 add_header 不会被继承，必须在这里再发一遍 CORS 头。
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin   "*" always;
            add_header Access-Control-Allow-Methods  "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers  $cors_allow_headers always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-PAYMENT-RESPONSE" always;
            add_header Access-Control-Max-Age 600 always;
            add_header Content-Length 0 always;
            add_header Content-Type "text/plain charset=UTF-8" always;
            return 204;
        }
    }

    # ================================
    #  /metadata/ -> ERC-1155 metadata JSON（代理 2222，Base Explorer 约定）
    # ================================
    location /metadata/ {
        proxy_pass http://127.0.0.1:2222/metadata/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ================================
    #  /go/* 短链（如 /go/verra-ndef）-> Cluster :2222，勿落入 SPA try_files
    # ================================
    location ^~ /go/ {
        proxy_pass http://127.0.0.1:2222;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }

    # =================== 动态 manifest API（代理 2222）；404/502 时回退到静态文件
    # ================================
    location = /app/manifest.json {
        proxy_intercept_errors on;
        error_page 404 502 503 504 = @manifest_static;
        proxy_pass http://127.0.0.1:2222/api/manifest.json$is_args$args;
        proxy_hide_header Cache-Control;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    }
    location @manifest_static {
        default_type application/manifest+json;
        root /var/www/beamio.app;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files /app/manifest.json =404;
    }

    # /app 下带 hash 的静态资源：长缓存（须写在通用 /app 之前，与 cashtrees.beamio.app 一致）
    location ^~ /app/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /app/assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================================
    #  /app -> React SPA（HTML 壳勿长期缓存，否则客户端 WebView 一直用旧 index）
    # ================================
    location /app {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /app/index.html;
    }

    # ================================
    #  /testapp -> React SPA
    # ================================
    location /testapp {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /app/index.html;
    }

    # /biz 下带 hash 的静态资源：长缓存
    location ^~ /biz/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /biz/assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================================
    #  /biz -> React SPA
    # ================================
    location /biz {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /biz/index.html;
    }

    # ================================
    #  static assets
    # ================================
    location /static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================================
    #  Root / Homepage SPA fallback（HTML 壳勿长期缓存）
    # ================================
    location / {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri /index.html;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.settleonbase.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.settleonbase.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot



}

server {
    server_name biz.beamio.app;
    root /var/www/biz.beamio.app;
    index index.html;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    location ^~ /.well-known/ {
        try_files $uri =404;
    }
    location = / {
        return 301 /biz/;
    }
    location = /biz {
        return 301 /biz/;
    }

    location = /biz/ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files /biz/index.html =404;
    }

    location ^~ /biz/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /biz/assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # CRA `public/*` (logo512.png, favicon.ico, manifest.json, …) + SPA routes.
    # Without this, only /biz/, /biz/static/, /biz/assets/ matched; /biz/logo512.png fell through to `location /` → 404.
    # HTML 壳 / SPA fallback：no-cache，避免 iOS/Android WebView 长期缓存旧 index
    location ^~ /biz/ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri /biz/index.html;
    }

    location / {
        return 404;
    }
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.settleonbase.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.settleonbase.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

