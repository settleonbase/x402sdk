server {
    server_name beamio.app;

    root /var/www/beamio.app;
    index index.html;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ================================
    #  /.well-known/
    # ================================
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # ================================
    #  API Proxy -> localhost:2222
    # ================================
    location /api/ {
        proxy_pass http://127.0.0.1:2222;

        # 保留真实 Host
        proxy_set_header Host $host;
        # 传递真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 让后端拿到 HTTPS 信息
        proxy_set_header X-Forwarded-Proto $scheme;

        # 避免 502 缓存
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 如果你的 API 是 JSON，强烈建议：
        proxy_set_header Accept "application/json";
        proxy_set_header Content-Type "application/json";

        # 如需允许 CORS（可选）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        # 处理预检请求
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ================================
    #  /metadata/ -> ERC-1155 metadata JSON（代理 2222，Base Explorer 约定）
    # ================================
    location /metadata/ {
        proxy_pass http://127.0.0.1:2222/metadata/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # =================== 动态 manifest API（代理 2222）；404/502 时回退到静态文件
    # ================================
    location = /app/manifest.json {
        proxy_intercept_errors on;
        error_page 404 502 503 504 = @manifest_static;
        proxy_pass http://127.0.0.1:2222/api/manifest.json$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    location @manifest_static {
        default_type application/manifest+json;
        root /var/www/beamio.app;
        try_files /app/manifest.json =404;
    }

    # ================================
    #  /app -> React SPA
    # ================================
    location /app {
        try_files $uri $uri/ /app/index.html;
    }

    # ================================
    #  /testapp -> React SPA
    # ================================
    location /testapp {
        try_files $uri $uri/ /app/index.html;
    }

    # ================================
    #  /biz -> React SPA
    # ================================
    location /biz {
        try_files $uri $uri/ /biz/index.html;
    }

    # ================================
    #  static assets
    # ================================
    location /static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================================
    #  Root / Homepage SPA fallback
    # ================================
    location / {
        try_files $uri /index.html;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.settleonbase.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.settleonbase.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot



}

server {
    server_name biz.beamio.app;
    root /var/www/biz.beamio.app;
    index index.html;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    location ^~ /.well-known/ {
        try_files $uri =404;
    }
    location = / {
        return 301 /biz/;
    }
    location = /biz {
        return 301 /biz/;
    }

    location = /biz/ {
        try_files /biz/index.html =404;
    }

    location ^~ /biz/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /biz/assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # CRA `public/*` (logo512.png, favicon.ico, manifest.json, …) + SPA routes.
    # Without this, only /biz/, /biz/static/, /biz/assets/ matched; /biz/logo512.png fell through to `location /` → 404.
    location ^~ /biz/ {
        try_files $uri /biz/index.html;
    }

    location / {
        return 404;
    }
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.settleonbase.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.settleonbase.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

