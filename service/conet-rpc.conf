# Beamio RPC 反向代理
# https://eth-rpc.conet.network  -> localhost:8545 (Ethereum 主网)
# https://base-rpc.conet.network -> localhost:8547 (Base 主网)
#
# 重要：Cloudflare Flexible SSL 时，CF 以 HTTP 连源站。
# Certbot 默认在 port 80 做 HTTP->HTTPS 301，会导致重定向循环。
# 必须将 port 80 改为 proxy，或删除 Certbot 的 HTTP redirect 块。
#
# 部署到服务器后，若之前用 certbot，需删除其生成的 port 80 redirect 块，
# 或整体替换为下方配置。
#
# WebSocket（eth_subscribe / ethers contract.on）：
# - 本文件须由 nginx 主配置在 http { } 内 include（以便下方 map 合法）。
# - Base 的 WSS 路径 wss://base-rpc.conet.network/ws 反代到本机 op-reth WS 端口 8548，
#   与 HTTP JSON-RPC 8547 分离；须设置 Upgrade / Connection 与长 read_timeout，
#   否则连接可建立但订阅无推送或很快被 60s 超时断开。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- Ethereum 主网 RPC ----------
server {
    listen 80;
    listen [::]:80;
    server_name eth-rpc.conet.network;

    access_log /var/log/nginx/eth-rpc.conet.network.access.log;
    error_log  /var/log/nginx/eth-rpc.conet.network.error.log;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8545;
    }
}

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name eth-rpc.conet.network;

    access_log /var/log/nginx/eth-rpc.conet.network.access.log;
    error_log  /var/log/nginx/eth-rpc.conet.network.error.log;

    ssl_certificate /etc/letsencrypt/live/base-rpc.conet.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/base-rpc.conet.network/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8545;
    }
}

# ---------- Base 主网 RPC ----------
server {
    listen 80;
    listen [::]:80;
    server_name base-rpc.conet.network;

    access_log /var/log/nginx/base-rpc.conet.network.access.log;
    error_log  /var/log/nginx/base-rpc.conet.network.error.log;

    # op-reth WebSocket :8548；路径 /ws -> 上游 /（Reth WS 在根路径）
    location /ws {
        proxy_pass http://127.0.0.1:8548/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8547;
    }
}

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name base-rpc.conet.network;

    access_log /var/log/nginx/base-rpc.conet.network.access.log;
    error_log  /var/log/nginx/base-rpc.conet.network.error.log;

    ssl_certificate /etc/letsencrypt/live/base-rpc.conet.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/base-rpc.conet.network/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /ws {
        proxy_pass http://127.0.0.1:8548/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8547;
    }
}
