# ipfs.conet.network — fragment API (127.0.0.1:8002)
# Cert: certbot certonly -d ipfs.conet.network

server {
    listen 80;
    listen [::]:80;
    server_name ipfs.conet.network;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    location /api/ {
        client_max_body_size 256m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://127.0.0.1:8002;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Range" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ipfs.conet.network;

    ssl_certificate /etc/letsencrypt/live/ipfs.conet.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ipfs.conet.network/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    location /api/ {
        client_max_body_size 256m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://127.0.0.1:8002;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Range" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
