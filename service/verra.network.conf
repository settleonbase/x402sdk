# verra.network — 参照 beamio.conf：API/metadata 代理 + 根首页 SPA + /app 另一套 React SPA
# 静态部署目录：/var/www/verra.network
#   - 首页（verra-home 等）：根目录 index.html、assets/（Vite 默认 base=/）
#   - /app：/app/index.html、/app/static、/app/assets
# SSL：与同机 beamio.conf 一致，复用 api.settleonbase.xyz 的 Let's Encrypt 目录（该 fullchain 的 SAN 须包含 verra.network）。
#      若尚未包含：certbot certonly --nginx -d verra.network（或扩展现有证书），再把下面两行改回 /etc/letsencrypt/live/verra.network/

server {
    server_name verra.network;

    root /var/www/verra.network;
    index index.html;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ================================
    #  /.well-known/
    # ================================
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # ================================
    #  API Proxy -> localhost:2222
    # ================================
    location /api/ {
        proxy_pass http://127.0.0.1:2222;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Accept "application/json";
        proxy_set_header Content-Type "application/json";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ================================
    #  /metadata/ -> ERC-1155 metadata JSON（代理 2222）
    # ================================
    location /metadata/ {
        proxy_pass http://127.0.0.1:2222/metadata/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # 动态 manifest API（代理 2222）；404/502 时回退到静态文件
    location = /app/manifest.json {
        proxy_intercept_errors on;
        error_page 404 502 503 504 = @verra_manifest_static;
        proxy_pass http://127.0.0.1:2222/api/manifest.json$is_args$args;
        proxy_hide_header Cache-Control;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    }
    location @verra_manifest_static {
        default_type application/manifest+json;
        root /var/www/verra.network;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files /app/manifest.json =404;
    }

    # ================================
    #  根路径 Homepage -> React SPA（勿 301 到 /app）
    # ================================
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = / {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # ================================
    #  /usdc-topup —— POS USDC topup 顾客端入口（verra-home SPA 路由 `<Route path="/usdc-topup" />`）
    #  POS NFC 确认后 iOS 端生成 QR 指向：
    #    https://verra.network/usdc-topup?card=...&owner=...&uid=...&e=...&c=...&m=...&amount=...&currency=...
    #  必须显式 no-store —— 否则钱包内置浏览器把旧报价/UID 缓存住会签到错的金额。
    #  保留 `?args`：try_files 内部重写到 /index.html 时 nginx 会自动把 $args 透传给前端 window.location.search。
    # ================================
    location = /usdc-topup {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        try_files /index.html =404;
    }

    # /app 下带 hash 的静态资源：长缓存（须写在通用 /app 之前）
    location ^~ /app/static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /app/assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================================
    #  /app -> 第二套 React SPA（HTML 壳勿长期缓存）
    # ================================
    location = /app {
        return 301 /app/;
    }

    location = /app/ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files /app/index.html =404;
    }

    # /app：CRA public/* + SPA 路由（与 cashtrees.beamio.app / alliance.beamio.app 一致）
    location ^~ /app/ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri /app/index.html;
    }

    # 站点根目录长缓存静态资源（若有）
    location /static/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 根路径 SPA 子路由（/local、/business、/usdc-topup 等；须排在 /app 之后，^~ /app 优先）
    # 也是 /usdc-topup 的兜底（上面 `= /usdc-topup` 是显式优先块，删了这里仍能匹配到 /index.html）。
    location / {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri /index.html;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.settleonbase.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.settleonbase.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = verra.network) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name verra.network;
    listen 80;
    return 404; # managed by Certbot


}